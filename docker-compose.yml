services:
  redis:
    image: redis:7-alpine
    container_name: prediction-bot-redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    # Only pass --requirepass if REDIS_PASSWORD is non-empty.
    # This prevents the "AUTH called without password configured" error
    # when REDIS_PASSWORD is blank in .env.
    command: >
      sh -c "
        redis-server /usr/local/etc/redis/redis.conf
        $${REDIS_PASSWORD:+--requirepass \"$${REDIS_PASSWORD}\"}
      "
    networks:
      - bot-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: prediction-bot
    container_name: prediction-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DOMAIN=${DOMAIN:-http://localhost:5000}
      - PORT=${PORT:-5000}
      - USE_HTTPS=${USE_HTTPS:-False}
      - DEFAULT_POINTS_EARN_INTERVAL=${DEFAULT_POINTS_EARN_INTERVAL:-300}
      - DEFAULT_POINTS_EARN_RATE=${DEFAULT_POINTS_EARN_RATE:-50}
      - DEFAULT_STARTING_POINTS=${DEFAULT_STARTING_POINTS:-1000}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      - redis
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  redis_data: