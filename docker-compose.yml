services:
  redis:
    image: redis:7-alpine
    container_name: prediction-bot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - bot-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: prediction-bot
    container_name: prediction-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  redis_data: